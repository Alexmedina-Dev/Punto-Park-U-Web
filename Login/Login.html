<!DOCTYPE html>
<html lang="es">
<head>
  <!--Meta Información general-->
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!--Titulo de pagina-->
  <title>"PUNTO PARK U" - Login</title>
  <!--Descripción de la pagina-->
    <meta name="author" content="Alexander Medina & Miguel Palacio" />
    <meta name="description" content="Aplicativo Web creado para la visualización de Información
   de los usuarios de Punto Park U"/>
    <meta name="keywords" content="">
     <!-- Seguridad -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!--Enlaces y estilos-->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Space+Grotesk:wght@400;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
   <link rel="stylesheet" href="Login.css" />
</head>
<body>

<main>
  <!-- LEFT: Login Form -->
  <section class="col-form">
    <div class="form-inner">

      <div class="brand">
        <h2>"PUNTO PARK U"</h2>
        <p>Sistema de Gestión de Parqueadero</p>
      </div>

      <div class="form-header">
        <h1>Inicio de sesión usuario</h1>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-fields">
          <div class="field">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" placeholder="Ingrese su usuario" required/>
          </div>
          <div class="field">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required/>
          </div>
          <div class="error-msg" id="errorMsg"></div>
          <button class="btn-submit" type="submit">
            INGRESAR
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </div>
      </form>

      <div class="register-link">
        <a href="/Registro/Registro.html">
          ¿No tienes cuenta? <span>Regístrate aquí</span>
        </a>
      </div>

    </div>
  </section>

  <!-- Visual Identity -->
  <section class="col-visual">
    <div class="watermark">
  <picture style="display: contents;">
    <source srcset="../Images/Logo.avif" type="image/avif" />
    <source srcset="../Images/Logo.webp" type="image/webp" />
    <img
      src="../Images/Logo.png"
      alt="Logo Punto Park U"
      loading="lazy"
      decoding="async"
    />
  </picture>
</div>
    <div class="gradient-overlay"></div>

    <div class="avatar-wrapper">
      <div class="avatar-ring">
        <div class="avatar-inner">
          <span class="material-symbols-outlined">person</span>
        </div>
      </div>
      <div class="badge-shield">
        <span class="material-symbols-outlined">shield</span>
      </div>
      <div class="badge-online">
        <div class="dot-online"></div>
        <span>System Online</span>
      </div>
    </div>
  </section>
</main>

<!-- Home Button -->
<a class="btn-home" href="/index.html">
  <span class="material-symbols-outlined home-icon">home</span>
  <span class="home-label">Inicio</span>
</a>

<!-- Footer -->
<footer>
    <p>
      <span class="footer-brand">© <span id="footer-year">2026</span> "Punto Park U"</span> 
      <span class="rights">Todos los derechos reservados</span>
    </p> 
</footer>

<script>
  function handleLogin(event) {
    event.preventDefault();

    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');

    // Reset error
    errorMsg.style.display = 'none';
    errorMsg.textContent = '';

    if (user.length < 3) {
      showError('El usuario debe tener al menos 3 caracteres.');
      return;
    }

    if (pass.length < 6) {
      showError('La contraseña debe tener al menos 6 caracteres.');
      return;
    }

    if (user === 'admin' && pass === 'admin123') {
      alert('¡Bienvenido, ' + user + '!');
      // window.location.href = '/dashboard'; // Redirigir al dashboard real
    } else {
      showError('Usuario o contraseña incorrectos.');
    }
  }

  function showError(msg) {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }

  // ── Año automático en footer ──────────────────────────────
document.getElementById("footer-year").textContent = new Date().getFullYear();

</script>

</body>
</html>

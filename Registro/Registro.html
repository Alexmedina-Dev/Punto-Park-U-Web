<!DOCTYPE html>
<html lang="es">
 -<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Título de la Página-->
    <title>Registro "Punto Park U"</title>
    <!-- Descripción de la Página-->
    <!-- Seguridad -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta
      name="description"
      content="Aplicativo Web creado para la visualización Información de
      los usuarios de Punto Park U"
    />
    <!-- Autor de la Página -->
    <meta name="author" content="Alexander Medina & Miguel Palacio" />
    <!-- Enlaces a Estilos CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    -<link rel="stylesheet" href="Registro.css" />
    <script src="Registro.js" defer></script>
  </head>
<body>
    <!-- Background Ambient -->
    <div class="bg-ambient">
        <div class="ambient-circle-1"></div>
        <div class="ambient-circle-2"></div>
    </div>

    <!-- Main Content -->
    <main>
        <!-- Registration Card -->
        <div class="registration-card">
            <!-- Avatar Header -->
            <div class="avatar-header">
                <div class="avatar-circle">
                    <span class="material-symbols-outlined">person_add</span>
                    <div class="avatar-ring"></div>
                </div>
                <h1>Registro de Usuario</h1>
                <p class="subtitle">Por favor, complete los campos para el registro</p>
            </div>

            <!-- Registration Form -->
            <form id="registrationForm">
                <!-- Form Grid -->
                <div class="form-grid">
                    <!-- Column 1 -->
                    <div>
                        <!-- Nombres -->
                        <div class="form-group">
                            <label for="nombres">Nombres</label>
                            <div class="input-wrapper">
                                <input type="text" id="nombres" name="nombres" placeholder="Ej. Juan Carlos" required minlength="2">
                                <span class="material-symbols-outlined input-icon">badge</span>
                            </div>
                        </div>

                        <!-- Apellidos -->
                        <div class="form-group">
                            <label for="apellidos">Apellidos</label>
                            <div class="input-wrapper">
                                <input type="text" id="apellidos" name="apellidos" placeholder="Ej. Pérez Gómez" required minlength="2">
                            </div>
                        </div>
                    </div>

                    <!-- Column 2 -->
                    <div>
                        <!-- Cédula -->
                        <div class="form-group">
                            <label for="cedula">Cédula</label>
                            <div class="input-wrapper">
                                <input type="text" id="cedula" name="cedula" placeholder="1010101010" required pattern="\d{6,12}" title="Debe contener entre 6 y 12 números">
                                <span class="material-symbols-outlined input-icon">id_card</span>
                            </div>
                        </div>

                        <!-- Fecha de Nacimiento -->
                        <div class="form-group">
                            <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                            <div class="input-wrapper">
                                <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Divider -->
                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">O Continuar Con</span>
                    <div class="divider-line"></div>
                </div>

                <!-- Social Login Buttons -->
                <div class="social-buttons">
                    <button type="button" class="social-btn" onclick="loginWithGoogle()">
                        <svg fill="currentColor" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </button>

                    <button type="button" class="social-btn" onclick="loginWithMicrosoft()">
                        <svg fill="currentColor" viewBox="0 0 24 24">
                            <path d="M11.4 24H0V12.6h11.4V24z" fill="#7fba00"/>
                            <path d="M24 24H12.6V12.6H24V24z" fill="#ffb900"/>
                            <path d="M11.4 11.4H0V0h11.4v11.4z" fill="#f25022"/>
                            <path d="M24 11.4H12.6V0H24v11.4z" fill="#00a4ef"/>
                        </svg>
                        Microsoft
                    </button>

                    <button type="button" class="social-btn" onclick="loginWithApple()">
                        <svg fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.56-1.702z" fill="#000000"/>
                        </svg>
                        Apple
                    </button>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button type="submit" class="btn-primary">REGISTRARSE</button>
                    <button type="button" class="btn-secondary" onclick="window.location.href='/'">Volver al Inicio</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-copyright">
            © 2024 PUNTO PARK U. DIGITAL PRECISION.
        </div>
        <div class="footer-links">
            <a href="#">Soporte</a>
            <a href="#">Términos y Condiciones</a>
            <a href="#">Privacidad</a>
        </div>
    </footer>
</body>
</html>

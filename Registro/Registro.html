<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Título de la Página -->
    <title>Registro "Punto Park U"</title>
    <!-- Descripción de la Página -->
    <meta
      name="description"
      content="Aplicativo Web creado para la visualización Información de
      los usuarios de Punto Park U"
    />
    <!-- Autor de la Página -->
    <meta name="author" content="Alexander Medina & Miguel Palacio" />
    <!-- Enlaces a Estilos CSS -->
    <link rel="stylesheet" href="Registro.css" />
    <script src="Registro.js"></script>
  </head>

  <body>
    <div class="container">
      <div class="logo-section">
        <div class="user-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
            />
          </svg>
        </div>
        <h1>Registro de Usuario</h1>
        <p class="subtitle">Complete el formulario con sus datos</p>
      </div>

      <form id="registerForm">
        <div class="form-columns">
          <!-- Columna Izquierda: Nombres y Apellidos -->
          <div class="column-left">
            <div class="form-group">
              <label for="firstName">Nombres *</label>
              <input
                type="text"
                id="firstName"
                placeholder="Nombres"
                required
              />
            </div>

            <div class="form-group">
              <label for="lastName">Apellidos *</label>
              <input
                type="text"
                id="lastName"
                placeholder="Apellidos"
                required
              />
            </div>
          </div>

          <!-- Columna Derecha: Cédula y Fecha de Nacimiento -->
          <div class="column-right">
            <div class="form-group">
              <label for="idNumber">Cédula *</label>
              <input
                type="text"
                id="idNumber"
                placeholder="Número de cédula"
                required
                pattern="[0-9]+"
              />
            </div>

            <div class="form-group">
              <label for="birthDate">Fecha de Nacimiento *</label>
              <input type="date" id="birthDate" required />
            </div>
          </div>
        </div>

        <!-- Botones ocupan todo el ancho -->
        <button type="submit" class="btn btn-primary">Registrarse</button>
        <button
          type="button"
          class="btn btn-secondary"
          onclick="window.location.href = '../login/login.html'"
        >
          Volver al Login
        </button>
      </form>
    </div>

    <footer>
      <div>
          <picture>
            <source srcset="../Images/Logo.avif" type="image/avif">
            <source srcset="../Images/Logo.webp" type="image/webp">
            <img class="logo" 
                 src="../Images/Logo.png" 
                 alt="Logo Punto Park U"
                 loading="lazy"
                 decoding="async">
        </picture>
      </div>
      <div>
        <p>
          <strong
            >©2025 "PUNTO PARK U" Sistema de Gestión de Parqueadero - Todos los
            derechos reservados</strong
          >
        </p>
      </div>
    </footer>
  </body>
</html>

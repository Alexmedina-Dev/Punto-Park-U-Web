<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Registro Exitoso! - PUNTO PARK U</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <link rel="stylesheet" href="registro-exitoso.css">
</head>

<body>

  <div class="bg-glow"></div>

  <main>
    <div class="card">

    
    <!-- Botón de cerrar -->
    <button class="close-btn" aria-label="Cerrar">&times;</button>
    

      <!-- Icon -->
      <div class="icon-wrapper">
        <div class="icon-ring"></div>
        <div class="icon-circle">
          <span class="material-symbols-outlined">check</span>
        </div>
      </div>

      <!-- Typography -->
      <h1 class="title">¡Registro Exitoso!</h1>
      <p class="subtitle">Tu cuenta ha sido creada correctamente</p>

      <!-- Info -->
      <div class="info-box">
        <div>
          <span class="info-label">Nombre Completo</span>
          <p class="info-value" id="userName">Usuario Registrado</p>
        </div>
        <div class="divider"></div>
        <div>
          <span class="info-label">Número de Cédula</span>
          <p class="info-value mono" id="userId">*** *** ****</p>
        </div>
      </div>
    </div>
  </main>

  <div class="footer-bar"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const nombre = params.get("nombre");
      const cedula = params.get("cedula");

      if (nombre) document.getElementById("userName").textContent = nombre;
      if (cedula) document.getElementById("userId").textContent = cedula;
    });
  </script>

</body>

</html>
